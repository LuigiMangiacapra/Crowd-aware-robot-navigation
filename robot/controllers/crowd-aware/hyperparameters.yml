thiago:

  # =========================================================
  # ENVIRONMENT
  # =========================================================
  environment: "webots"


  # =========================================================
  # TRAINING CONTROL
  # =========================================================
  n_episodes: 6000
  # max_timestep: 1000  # valore massimo di step per episodio
  max_timestep: 300    # era 1000 → 300 decisioni × 192ms = ~57s per episodio

  # =========================================================
  # EXPLORATION (EPSILON GREEDY)
  # =========================================================
  epsilon: 1.0
  min_epsilon: 0.05
  # epsilon_steps: 400000
  epsilon_steps: 80000


  # =========================================================
  # REINFORCEMENT LEARNING CORE
  # =========================================================
  discount_factor: 0.99
  learning_rate_dqn: 3e-5
  learning_rate_rnn: 5e-5


  # =========================================================
  # MEMORY / BATCHING
  # =========================================================
  memory_maxlen: 150000
  batch_size: 128


  # =========================================================
  # PREFERENCE MODELING (MULTI-OBJECTIVE)
  # =========================================================
  n_pref_samples: 6


  # =========================================================
  # TARGET NETWORK UPDATE
  # =========================================================
  target_update_freq: 4000 # ogni quanti episodi aggiornare la target network


  # =========================================================
  # LUNGHEZZA HISTORY PER SPATIAL E TEMPORAL ENCODING
  # =========================================================
  # steps_len: 30  # numero di passi da considerare per la storia (spatial e temporal)
  steps_len: 20        # era 30 → 20 × 192ms = 3.84s di storia — ottimo

